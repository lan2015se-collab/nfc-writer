<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Writer - Web API Demo</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #007aff;
            --text: #1d1d1f;
            --error: #ff3b30;
            --success: #34c759;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #86868b; font-size: 0.9rem; margin-bottom: 1.5rem; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #log {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 8px;
            background: #f5f5f7;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .err { color: var(--error); background: #fff2f1 !important; }
        .ok { color: var(--success); background: #f2faf3 !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>NFC 寫入器</h1>
    <p>支援 NDEF 格式標籤 (Android Chrome)</p>
    
    <input type="text" id="inputData" placeholder="輸入網址或文字..." value="https://">
    <button id="btnWrite">開始寫入</button>
    
    <div id="log">等待操作...</div>
</div>

<script>
    const btn = document.getElementById('btnWrite');
    const log = document.getElementById('log');
    const input = document.getElementById('inputData');

    function showLog(msg, type = '') {
        log.innerText = msg;
        log.className = type;
    }

    btn.addEventListener('click', async () => {
        // 檢查環境
        if (!('NDEFReader' in window)) {
            showLog("❌ 瀏覽器不支援 Web NFC (請用 Android Chrome)", "err");
            return;
        }

        try {
            // 禁用按鈕防止重複請求觸發 AbortError
            btn.disabled = true;
            showLog("⌛ 靠近標籤中...", "");

            const ndef = new NDEFReader();
            // 執行寫入
            await ndef.write(input.value);
            
            showLog("✅ 寫入成功！", "ok");
        } catch (error) {
            console.error(error);
            if (error.name === 'AbortError') {
                showLog("⚠️ 已取消前一次請求", "err");
            } else if (error.name === 'NotAllowedError') {
                showLog("❌ 權限被拒絕", "err");
            } else {
                showLog(`❌ 錯誤: ${error.message}`, "err");
            }
        } finally {
            // 3秒後恢復按鈕
            setTimeout(() => { btn.disabled = false; }, 3000);
        }
    });
</script>

</body>
</html>
